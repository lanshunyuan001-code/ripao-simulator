  <g opacity=".72">
    <rect x="84" y="208" width="12" height="18" fill="#f6b94b"/>
    <rect x="240" y="178" width="12" height="24" fill="#55d69a"/>
    <rect x="526" y="150" width="12" height="22" fill="#ff4d5f"/>
    <rect x="760" y="202" width="12" height="20" fill="#45c7d8"/>
    <rect x="800" y="230" width="12" height="18" fill="#f6b94b"/>
  </g>
  <g filter="url(#glow)">
    <path d="M84 330c60-52 111-52 154 0s93 52 150 0 112-52 168 0 106 52 162 0 106-52 158 0" fill="none" stroke="url(#pulse)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="84" cy="330" r="8" fill="#55d69a"/>
    <circle cx="390" cy="330" r="8" fill="#f6b94b"/>
    <circle cx="718" cy="330" r="8" fill="#ff4d5f"/>
  </g>
