<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">城市控制台</title>
  <desc id="desc">暗色城市剪影、霓虹线路和警报式控制台图形。</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#121722"/>
      <stop offset="0.45" stop-color="#071016"/>
      <stop offset="1" stop-color="#14090d"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" x2="1">
      <stop offset="0" stop-color="#55d69a"/>
      <stop offset="0.52" stop-color="#f6b94b"/>
      <stop offset="1" stop-color="#ff4d5f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="960" height="420" fill="url(#sky)"/>
  <rect width="960" height="420" fill="url(#grid)" opacity=".9"/>
